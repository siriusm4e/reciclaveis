user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    # =========================================================================
    # MIME, charset
    # =========================================================================
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # =========================================================================
    # Logging
    # =========================================================================
    log_format main escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log  /var/log/nginx/access.log  main;

    # =========================================================================
    # Performance
    # =========================================================================
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    client_max_body_size 15M;     # Uploads documentos / fotos (limite app é 10MB)
    client_body_buffer_size 128k;
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;

    # =========================================================================
    # GZip
    # =========================================================================
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.api+json
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy
        text/javascript;

    # =========================================================================
    # Upstream backends
    # =========================================================================
    upstream pnr_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream pnr_frontend {
        server frontend:5173;
        keepalive 16;
    }

    # =========================================================================
    # WebSocket upgrade map
    # =========================================================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================================================================
    # Server principal — PNR
    # =========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ---------- Headers de segurança ----------
        add_header X-Frame-Options           "DENY"                                              always;
        add_header X-Content-Type-Options    "nosniff"                                           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"                   always;
        add_header X-XSS-Protection          "1; mode=block"                                     always;
        add_header Permissions-Policy        "geolocation=(self), camera=(self), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"               always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://tile.openstreetmap.org; connect-src 'self' ws: wss: https://nominatim.openstreetmap.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # ---------- /api → FastAPI ----------
        location /api/ {
            proxy_pass         http://pnr_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering off;
        }

        # ---------- /ws → WebSocket (chat negociação + notificações conta) ----------
        location /ws/ {
            proxy_pass         http://pnr_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout    3600s;   # WebSocket de longa duração
            proxy_send_timeout    3600s;
        }

        # ---------- /storage → uploads estáticos (documentos, anúncios, avatares, conteúdo) ----------
        # Servido direto do volume montado, sem passar pelo backend.
        location /storage/ {
            alias /var/www/storage/;
            autoindex off;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            # Cache moderado — uploads são imutáveis (UUID como nome)
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";

            # Bloquear execução de scripts no diretório de uploads
            location ~* \.(php|phtml|py|sh|cgi|pl|exe)$ {
                deny all;
            }
        }

        # ---------- / → Vite dev (React + Capacitor WebView source) ----------
        # Em produção, substituir por `root /usr/share/nginx/html;` apontando para dist/.
        location / {
            proxy_pass         http://pnr_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;       # HMR WebSocket Vite
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout    600s;
        }

        # ---------- Bloquear arquivos sensíveis ----------
        location ~ /\.(git|env|ht|svn|DS_Store) { deny all; return 404; }
        location ~ /(\.well-known/.*)$           { allow all; }
    }
}
